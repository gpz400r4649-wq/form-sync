<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f2ec">
  <title>フォームシンク | 体育フォーム比較</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">PHYSICAL EDUCATION</p>
        <h1>フォームシンク</h1>
      </div>
      <div class="privacy-badge" aria-label="プライバシー保護">
        <span class="privacy-dot" aria-hidden="true"></span>
        端末内だけで処理
      </div>
    </header>

    <section class="video-stack" aria-label="動画比較">
      <article class="video-card model-card">
        <div class="card-heading">
          <div class="video-label">
            <span class="label-number">01</span>
            <div>
              <span class="label-kicker">REFERENCE</span>
              <h2>お手本動画</h2>
            </div>
          </div>
          <label class="file-button">
            <input id="modelFile" type="file" accept="video/*">
            <span>動画を選ぶ</span>
          </label>
        </div>
        <div class="video-frame">
          <video id="modelVideo" playsinline webkit-playsinline preload="metadata" muted></video>
          <div class="empty-state" id="modelEmpty">
            <span class="empty-icon" aria-hidden="true">＋</span>
            <p>お手本動画を選択</p>
            <small>端末内の動画ファイル</small>
          </div>
          <span class="time-chip" id="modelTime">00:00.0</span>
        </div>
      </article>

      <article class="video-card student-card">
        <div class="card-heading">
          <div class="video-label">
            <span class="label-number">02</span>
            <div>
              <span class="label-kicker">STUDENT</span>
              <h2>生徒動画</h2>
            </div>
          </div>
          <label class="file-button">
            <input id="studentFile" type="file" accept="video/*">
            <span>動画を選ぶ</span>
          </label>
        </div>
        <div class="video-frame">
          <video id="studentVideo" playsinline webkit-playsinline preload="metadata" muted></video>
          <div class="empty-state" id="studentEmpty">
            <span class="empty-icon" aria-hidden="true">＋</span>
            <p>生徒動画を選択</p>
            <small>端末内の動画ファイル</small>
          </div>
          <span class="time-chip" id="studentTime">00:00.0</span>
        </div>
      </article>
    </section>

    <section class="control-deck" aria-label="再生コントロール">
      <div class="timeline-row">
        <span id="currentTime" class="timeline-time">00:00.0</span>
        <input id="seekBar" class="seek-bar" type="range" min="0" max="1000" value="0" step="1" aria-label="再生位置" disabled>
        <span id="durationTime" class="timeline-time end-time">00:00.0</span>
      </div>

      <div class="primary-controls">
        <button id="backButton" class="icon-button" type="button" aria-label="0.1秒戻る" disabled>
          <span aria-hidden="true">−0.1</span><small>秒</small>
        </button>
        <button id="playButton" class="play-button" type="button" aria-label="再生" disabled>
          <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13l10-6.5z"/></svg>
          <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
        </button>
        <button id="forwardButton" class="icon-button" type="button" aria-label="0.1秒進む" disabled>
          <span aria-hidden="true">＋0.1</span><small>秒</small>
        </button>
      </div>

      <div class="settings-grid">
        <fieldset class="setting-group speed-group">
          <legend>再生速度</legend>
          <div class="segmented-control" id="speedControl">
            <button type="button" data-speed="0.25">0.25×</button>
            <button type="button" data-speed="0.5">0.5×</button>
            <button type="button" data-speed="1" class="active">1×</button>
          </div>
        </fieldset>

        <fieldset class="setting-group offset-group">
          <legend>生徒動画の同期調整</legend>
          <div class="offset-control">
            <button id="offsetMinus" type="button" aria-label="生徒動画を0.1秒遅らせる">−</button>
            <output id="offsetValue" aria-live="polite">±0.0 秒</output>
            <button id="offsetPlus" type="button" aria-label="生徒動画を0.1秒進める">＋</button>
            <button id="offsetReset" class="reset-button" type="button" disabled>0秒に戻す</button>
          </div>
          <p class="offset-help">− 遅らせる ／ ＋ 先へ進める</p>
        </fieldset>
      </div>
    </section>

    <footer>
      <span class="lock-mark" aria-hidden="true">●</span>
      動画データはアップロードされません
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
